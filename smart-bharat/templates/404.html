{% extends "base.html" %}
{% block title %}Page Not Found - Smart Bharat{% endblock %}
{% block content %}
<section class="max-w-2xl mx-auto px-4 py-24 text-center">
  <div class="glass-card rounded-3xl p-10 fade-in-up">
    <i data-lucide="map-pin-off" class="w-16 h-16 mx-auto text-blue-500 mb-4"></i>
    <h1 class="font-display font-bold text-3xl mb-2">404 - Page Not Found</h1>
    <p class="text-slate-500 dark:text-slate-400 mb-6">The page you're looking for seems to have wandered off the map.</p>
    <a href="{{ url_for('main.index') }}" class="btn-shine inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-full shadow-md transition">
      <i data-lucide="home" class="w-4 h-4"></i> Back to Home

  </div>
</section>
